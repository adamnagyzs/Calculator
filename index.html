<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Odin Calculator</h1>
    <div id="calculatorContainer">
      <button id="clearButton" data-key="c">C</button>
      <button class="numberButton" data-key="7">7</button>
      <button class="numberButton" data-key="8">8</button>
      <button class="numberButton" data-key="9">9</button>
      <button class="numberButton" data-key="4">4</button>
      <button class="numberButton" data-key="5">5</button>
      <button class="numberButton" data-key="6">6</button>
      <button class="numberButton" data-key="1">1</button>
      <button class="numberButton" data-key="2">2</button>
      <button class="numberButton" data-key="3">3</button>
      <button class="numberButton" data-key="0">0</button>
      <button id="dotButton" data-key=".">.</button>
      <button class="operatorButton" data-key="/">÷</button>
      <button class="operatorButton" data-key="x">x</button>
      <button class="operatorButton" data-key="-">-</button>
      <button class="operatorButton" data-key="+">+</button>
      <button id="equalButton" data-key="Enter">=</button>
      <button id="delButton" data-key="Backspace">DEL</button>
    </div>
    <div id="resultContainer"></div>
  </body>
  <script src="script.js"></script>
</html>
